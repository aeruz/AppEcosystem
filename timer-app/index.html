<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animation Production Deck</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #08080a;
            color: #f1f5f9;
            overflow: hidden;
            height: 100vh;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Digital Clock Effect: Narrow and Squarish */
        .digital-lcd {
            font-family: 'JetBrains Mono', monospace;
            display: inline-block;
            transform: scaleX(0.85);
            transform-origin: center;
            letter-spacing: -0.02em;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: #1e293b;
            border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: #3b82f6;
            margin-top: -5px;
            cursor: pointer;
        }

        #headerDragger {
            height: 6px;
            cursor: ns-resize;
            background: rgba(255, 255, 255, 0.03);
            transition: background 0.2s;
        }
        #headerDragger:hover, #headerDragger.active {
            background: #3b82f6;
        }

        .work-history-block {
            z-index: 5;
            border-left-width: 2px;
        }

        /* Active Follow Button State */
        .btn-follow-active {
            background-color: #3b82f6 !important;
            color: #ffffff !important;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        /* Simplified Solid Colors for Time of Day (No gradients) */
        .bg-midnight { background-color: #0f172a; }
        .bg-morning { background-color: #78350f; }
        .bg-afternoon { background-color: #075985; }
        .bg-evening { background-color: #431407; }
    </style>
</head>
<body class="select-none flex flex-col">

    <!-- Header: Streamlined and Grouped Controls -->
    <header id="mainHeader" class="bg-[#111115] border-b border-white/5 flex flex-col shrink-0 z-50 shadow-2xl transition-[height] duration-75" style="height: 120px; min-height: 100px; max-height: 450px;">
        <div class="flex-1 px-6 py-4 flex flex-row items-center justify-between gap-8 overflow-hidden">
            
            <!-- Left: Clock -->
            <div class="flex flex-col shrink-0">
                <div class="flex items-center gap-2">
                    <h1 id="mainClock" class="text-2xl font-mono font-bold tracking-tighter text-slate-200 leading-none">00:00:00</h1>
                    <button id="timeFormatToggle" class="px-1.5 py-0.5 rounded-none border border-white/10 bg-white/5 text-[8px] font-black text-slate-500 uppercase">12H</button>
                </div>
                <p id="currentDate" class="text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold mt-1">SUN, MAR 29</p>
            </div>

            <!-- Middle: Editable Title -->
            <div class="flex-1 max-w-xl flex flex-col items-center">
                <input id="projectTitleInput" type="text" value="NEW ANIMATION PROJECT" class="w-full bg-transparent text-center text-xs md:text-sm font-black tracking-[0.4em] text-blue-500/80 focus:text-white outline-none border-b border-white/5 focus:border-blue-500/50 pb-1 transition-all uppercase">
                <span class="text-[7px] font-bold text-slate-600 uppercase tracking-[0.3em] mt-1">Production Console</span>
            </div>

            <!-- Right: Combined Controls Group -->
            <div class="flex items-center gap-4 shrink-0">
                <!-- Session LCD -->
                <div class="flex flex-col items-end">
                    <span class="text-[7px] font-black text-slate-600 uppercase tracking-widest mb-1">Session</span>
                    <div class="bg-black/40 border border-white/5 px-3 py-1">
                        <span id="sessionTimerDisplay" class="digital-lcd text-2xl font-bold text-orange-500 leading-none">00:00:00</span>
                    </div>
                </div>

                <!-- Buttons Side-by-Side -->
                <div class="flex gap-1 bg-white/5 p-1 border border-white/5">
                    <button id="followLiveBtn" title="Follow Live Timeline" class="w-10 h-10 flex items-center justify-center bg-white/5 border border-white/5 rounded-none transition-all hover:bg-white/10 active:scale-95 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                    
                    <button id="mainActionBtn" title="Toggle Tracking" class="w-10 h-10 flex items-center justify-center bg-blue-600 hover:bg-blue-500 text-white transition-all active:scale-95">
                        <span id="actionIcon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="m7 4 12 8-12 8V4z"/></svg>
                        </span>
                    </button>
                </div>

                <!-- Tiny Status Indicator -->
                <div class="flex flex-col items-center gap-1 w-8">
                     <div id="statusPulse" class="w-1.5 h-1.5 rounded-none bg-slate-600"></div>
                     <span id="statusLabel" class="text-[7px] font-black uppercase text-slate-600">IDLE</span>
                </div>
            </div>
        </div>

        <div id="headerDragger" class="w-full flex items-center justify-center pb-1">
            <div class="w-10 h-1 bg-white/10 rounded-full"></div>
        </div>
    </header>

    <main class="flex-1 flex flex-col bg-[#050507] overflow-hidden relative">
        
        <!-- Controls HUD -->
        <div class="flex flex-wrap justify-between items-center px-4 py-2 border-b border-white/5 bg-[#0a0a0e] shrink-0 z-30">
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-3 bg-white/5 px-3 py-1 rounded-none border border-white/10">
                    <span class="text-[8px] font-black text-slate-500 uppercase tracking-widest">Vertical Zoom</span>
                    <input id="vScaleSlider" type="range" min="1" max="10" value="3" step="0.1" class="w-20 sm:w-28 h-1 accent-blue-500">
                    <span id="vScaleDisplay" class="text-[8px] font-mono text-blue-400 w-8">3.0x</span>
                </div>
                <div class="flex items-center gap-3 bg-white/5 px-3 py-1 rounded-none border border-white/10">
                    <span class="text-[8px] font-black text-slate-500 uppercase tracking-widest">Track Width</span>
                    <input id="trackWidthSlider" type="range" min="40" max="600" value="120" class="w-20 sm:w-28 h-1 accent-blue-500">
                    <span id="trackWidthDisplay" class="text-[8px] font-mono text-blue-400 w-10">120px</span>
                </div>
            </div>

            <div class="flex items-center gap-4 text-[9px] font-black uppercase text-slate-600">
                <div class="flex items-center gap-1"><div class="w-2 h-2 bg-blue-500"></div> Tracking</div>
                <div class="flex items-center gap-1"><div class="w-2 h-2 border-l-2 border-blue-400 bg-blue-900/40"></div> Logged</div>
            </div>
        </div>

        <!-- THE TIMELINE -->
        <div id="timelineContainer" class="flex-1 overflow-y-auto relative scrollbar-hide bg-[#050507]">
            <div id="timelineScrollSurface" class="relative">
                
                <!-- Atmosphere Indicator Strip (Far Left - Now Solid Colors) -->
                <div id="atmosphereGrid" class="absolute left-0 w-2 h-full border-r border-white/5"></div>

                <!-- Time Grid and Spine -->
                <div id="timeGrid" class="absolute left-2 right-0 pointer-events-none"></div>
                <div id="timelineSpine" class="absolute left-20 h-full border-x border-white/5 bg-white/[0.02]" style="width: 120px;"></div>
                
                <div id="historyLayer"></div>
                <div id="activeLayer" class="absolute left-20 bg-blue-500 z-10 border-l-2 border-blue-400" style="width: 120px; top: 0; height: 0; display: none;"></div>
                
                <!-- NOW Needle -->
                <div id="nowNeedle" class="absolute left-0 right-0 z-20 flex items-center pointer-events-none">
                    <div class="h-px flex-1 bg-red-600/20"></div>
                    <div class="h-0.5 w-full bg-red-600 shadow-[0_0_15px_red]" style="margin-left: 5rem;"></div>
                    <div class="absolute left-20 -translate-y-1/2 bg-red-600 text-[8px] font-black px-1.5 py-0.5 text-white rounded-none ring-1 ring-slate-950 uppercase">NOW</div>
                </div>
            </div>
        </div>

        <footer class="p-2 px-6 bg-[#111115] border-t border-white/10 flex justify-between items-center text-[10px] shrink-0 font-mono text-slate-500 uppercase tracking-widest">
            <div id="footerStatus">DECK ACTIVE</div>
            <div id="footerClock" class="text-blue-500 font-bold">00:00</div>
        </footer>
    </main>

    <script>
        // State
        let is24Hour = false, trackWidth = 120, vScale = 3.0;
        let isRecording = false, isFollowingLive = true, sessionSeconds = 0;
        let activeStartTime = null, history = [];

        // DOM
        const mainHeader = document.getElementById('mainHeader'), headerDragger = document.getElementById('headerDragger');
        const mainClock = document.getElementById('mainClock'), footerClock = document.getElementById('footerClock');
        const sessionTimerDisplay = document.getElementById('sessionTimerDisplay'), mainActionBtn = document.getElementById('mainActionBtn');
        const followLiveBtn = document.getElementById('followLiveBtn'), vScaleSlider = document.getElementById('vScaleSlider');
        const trackWidthSlider = document.getElementById('trackWidthSlider'), timelineContainer = document.getElementById('timelineContainer');
        const timelineScrollSurface = document.getElementById('timelineScrollSurface'), timelineSpine = document.getElementById('timelineSpine');
        const activeLayer = document.getElementById('activeLayer'), nowNeedle = document.getElementById('nowNeedle');
        const timeGrid = document.getElementById('timeGrid'), historyLayer = document.getElementById('historyLayer'), atmosphereGrid = document.getElementById('atmosphereGrid');

        const formatClockTime = (date, sec = false) => {
            if (!date) return "--:--";
            return date.toLocaleTimeString([], { hour12: !is24Hour, hour: '2-digit', minute: '2-digit', second: sec ? '2-digit' : undefined });
        };

        const formatFullDuration = (s) => {
            const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        };

        const getPos = (d) => {
            const s = new Date(); s.setHours(0, 0, 0, 0);
            return ((d - s) / 60000) * vScale;
        };

        const renderTimeGrid = () => {
            if (!timeGrid) return;
            timeGrid.innerHTML = '';
            atmosphereGrid.innerHTML = '';
            const hourHeight = 60 * vScale;
            timelineScrollSurface.style.height = `${48 * hourHeight}px`;

            for (let i = 0; i < 48; i++) {
                const h = i % 24;
                
                const div = document.createElement('div');
                div.className = `absolute left-0 right-0 border-t border-white/5 flex items-start`;
                div.style.top = `${i * hourHeight}px`; div.style.height = `${hourHeight}px`;
                let label = is24Hour ? `${h.toString().padStart(2, '0')}:00` : `${h % 12 || 12} ${h >= 12 ? 'PM' : 'AM'}`;
                if (i === 0) label = "TODAY"; if (i === 24) label = "DAY 2";
                div.innerHTML = `<span class="text-[8px] font-mono block pl-2 pt-1 ${i >= 24 ? 'text-blue-500/40' : 'text-slate-600'}">${label}</span>`;
                timeGrid.appendChild(div);

                const atm = document.createElement('div');
                atm.className = 'absolute left-0 w-full opacity-30';
                atm.style.top = `${i * hourHeight}px`; atm.style.height = `${hourHeight}px`;
                
                let bgClass = '';
                if (h >= 0 && h < 6) bgClass = 'bg-midnight';
                else if (h >= 6 && h < 12) bgClass = 'bg-morning';
                else if (h >= 12 && h < 18) bgClass = 'bg-afternoon';
                else bgClass = 'bg-evening';
                
                atm.classList.add(bgClass);
                atmosphereGrid.appendChild(atm);
            }
            renderHistory();
        };

        const renderHistory = () => {
            if (!historyLayer) return;
            historyLayer.innerHTML = '';
            history.forEach(seg => {
                const div = document.createElement('div');
                div.className = 'absolute left-20 work-history-block border-l-2 border-blue-400';
                div.style.top = `${getPos(seg.start)}px`; 
                div.style.height = `${Math.max(2, getPos(seg.end) - getPos(seg.start))}px`;
                div.style.backgroundColor = 'rgba(59, 130, 246, 0.4)';
                div.style.width = `${trackWidth}px`;
                historyLayer.appendChild(div);
            });
        };

        const updateUI = () => {
            const now = new Date();
            if (mainClock) mainClock.textContent = formatClockTime(now, true);
            if (footerClock) footerClock.textContent = formatClockTime(now);
            
            const nowY = getPos(now);
            if (nowNeedle) nowNeedle.style.top = `${nowY}px`;

            if (isFollowingLive) {
                timelineContainer.scrollTop = nowY - (timelineContainer.clientHeight / 2);
            }

            if (isRecording) {
                sessionSeconds++;
                sessionTimerDisplay.textContent = formatFullDuration(sessionSeconds);
                activeLayer.style.top = `${getPos(activeStartTime)}px`;
                activeLayer.style.height = `${nowY - getPos(activeStartTime)}px`;
                activeLayer.style.width = `${trackWidth}px`;
                activeLayer.style.display = 'block';
                document.getElementById('statusPulse').className = "w-1.5 h-1.5 rounded-none bg-green-500 animate-pulse";
                document.getElementById('statusLabel').textContent = "REC";
            } else {
                activeLayer.style.display = 'none';
                document.getElementById('statusPulse').className = "w-1.5 h-1.5 rounded-none bg-slate-600";
                document.getElementById('statusLabel').textContent = "IDLE";
            }
        };

        mainActionBtn.onclick = () => {
            isRecording = !isRecording;
            if (isRecording) {
                activeStartTime = new Date();
                document.getElementById('actionIcon').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect width="4" height="16" x="6" y="4" rx="1"/><rect width="4" height="16" x="14" y="4" rx="1"/></svg>`;
                mainActionBtn.className = "w-10 h-10 flex items-center justify-center bg-orange-600 hover:bg-orange-500 text-white transition-all active:scale-95 shadow-[0_0_15px_rgba(234,88,12,0.3)]";
            } else {
                if (activeStartTime) history.push({ start: activeStartTime, end: new Date() });
                document.getElementById('actionIcon').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="m7 4 12 8-12 8V4z"/></svg>`;
                mainActionBtn.className = "w-10 h-10 flex items-center justify-center bg-blue-600 hover:bg-blue-500 text-white transition-all active:scale-95 shadow-[0_0_15px_rgba(37,99,235,0.3)]";
                renderHistory();
            }
        };

        followLiveBtn.onclick = () => {
            isFollowingLive = !isFollowingLive;
            followLiveBtn.classList.toggle('btn-follow-active', isFollowingLive);
        };

        vScaleSlider.oninput = (e) => {
            vScale = parseFloat(e.target.value);
            document.getElementById('vScaleDisplay').textContent = vScale.toFixed(1) + 'x';
            renderTimeGrid();
        };

        trackWidthSlider.oninput = (e) => {
            trackWidth = parseInt(e.target.value);
            document.getElementById('trackWidthDisplay').textContent = trackWidth + 'px';
            timelineSpine.style.width = activeLayer.style.width = `${trackWidth}px`;
            renderHistory();
        };

        let isResizing = false;
        headerDragger.onpointerdown = () => { isResizing = true; headerDragger.classList.add('active'); };
        document.addEventListener('pointermove', (e) => {
            if (!isResizing) return;
            const h = Math.min(Math.max(100, e.clientY), 450);
            mainHeader.style.height = `${h}px`;
        });
        document.addEventListener('pointerup', () => { isResizing = false; headerDragger.classList.remove('active'); });

        document.getElementById('timeFormatToggle').onclick = () => {
            is24Hour = !is24Hour;
            document.getElementById('timeFormatToggle').textContent = is24Hour ? '24H' : '12H';
            renderTimeGrid();
        };

        renderTimeGrid();
        followLiveBtn.classList.add('btn-follow-active');
        setInterval(updateUI, 1000);
        updateUI();
    </script>
</body>
</html>
