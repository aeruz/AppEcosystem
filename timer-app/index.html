<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animation Production Deck</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #08080a;
            color: #f1f5f9;
            overflow: hidden;
            height: 100vh;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Digital Clock Effect: Narrow and Squarish */
        .digital-lcd {
            font-family: 'JetBrains Mono', monospace;
            display: inline-block;
            transform: scaleX(0.85);
            transform-origin: center;
            letter-spacing: -0.02em;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: #1e293b;
            border-radius: 10px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #3b82f6;
            margin-top: -6px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        #headerDragger {
            height: 12px;
            cursor: ns-resize;
            background: rgba(255, 255, 255, 0.02);
            transition: background 0.2s;
            touch-action: none; /* Critical for iPad smooth dragging */
        }
        #headerDragger:hover, #headerDragger.active {
            background: rgba(59, 130, 246, 0.2);
        }

        .work-history-block {
            z-index: 5;
            border-radius: 4px;
        }

        /* Active Follow Button State */
        .btn-follow-active {
            background-color: #3b82f6 !important;
            color: #ffffff !important;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }

        /* Simplified Solid Colors for Time of Day (No gradients) */
        .bg-midnight { background-color: #0f172a; }
        .bg-morning { background-color: #78350f; }
        .bg-afternoon { background-color: #075985; }
        .bg-evening { background-color: #431407; }
    </style>
</head>
<body class="select-none flex flex-col">

    <!-- Header: Curved iPad Aesthetic -->
    <header id="mainHeader" class="bg-[#111115] border-b border-white/5 flex flex-col shrink-0 z-50 shadow-2xl transition-[height] duration-75 rounded-b-[2.5rem]" style="height: 140px; min-height: 120px; max-height: 450px;">
        <div class="flex-1 px-8 py-4 flex flex-row items-center justify-between gap-8 overflow-hidden">
            
            <!-- Left: Clock -->
            <div class="flex flex-col shrink-0">
                <div class="flex items-center gap-2">
                    <h1 id="mainClock" class="text-3xl font-mono font-bold tracking-tighter text-slate-200 leading-none">00:00:00</h1>
                    <button id="timeFormatToggle" class="px-2 py-0.5 rounded-full border border-white/10 bg-white/5 text-[9px] font-black text-slate-500 uppercase hover:text-slate-300">12H</button>
                </div>
                <p id="currentDate" class="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold mt-2 ml-1">SUN, MAR 29</p>
            </div>

            <!-- Middle: Editable Title -->
            <div class="flex-1 max-w-xl flex flex-col items-center">
                <input id="projectTitleInput" type="text" value="NEW ANIMATION PROJECT" class="w-full bg-transparent text-center text-sm font-black tracking-[0.4em] text-blue-500 focus:text-white outline-none border-b border-white/5 focus:border-blue-500/50 pb-1 transition-all uppercase">
                <span class="text-[8px] font-bold text-slate-600 uppercase tracking-[0.3em] mt-2">Animation Production Deck</span>
            </div>

            <!-- Right: Combined Controls Group -->
            <div class="flex items-center gap-6 shrink-0">
                <!-- Session LCD with Curves -->
                <div class="flex flex-col items-end">
                    <span class="text-[8px] font-black text-slate-600 uppercase tracking-widest mb-1 mr-2">Live Session</span>
                    <div class="bg-black/40 border border-white/5 px-4 py-2 rounded-2xl shadow-inner">
                        <span id="sessionTimerDisplay" class="digital-lcd text-2xl font-bold text-orange-500 leading-none">00:00:00</span>
                    </div>
                </div>

                <!-- Buttons Side-by-Side (Curvy) -->
                <div class="flex gap-2 bg-white/5 p-1.5 rounded-full border border-white/5">
                    <button id="followLiveBtn" title="Follow Live Timeline" class="w-12 h-12 flex items-center justify-center bg-white/5 border border-white/5 rounded-full transition-all hover:bg-white/10 active:scale-90 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                    
                    <button id="mainActionBtn" title="Toggle Tracking" class="w-12 h-12 flex items-center justify-center bg-blue-600 hover:bg-blue-500 text-white rounded-full transition-all active:scale-90 shadow-lg shadow-blue-900/20">
                        <span id="actionIcon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="m7 4 12 8-12 8V4z"/></svg>
                        </span>
                    </button>
                </div>

                <!-- Status Indicator -->
                <div class="flex flex-col items-center gap-1 w-10">
                     <div id="statusPulse" class="w-2 h-2 rounded-full bg-slate-600 shadow-lg"></div>
                     <span id="statusLabel" class="text-[8px] font-black uppercase text-slate-600">IDLE</span>
                </div>
            </div>
        </div>

        <div id="headerDragger" class="w-full flex items-center justify-center pb-2">
            <div class="w-12 h-1.5 bg-white/10 rounded-full"></div>
        </div>
    </header>

    <main class="flex-1 flex flex-col bg-[#050507] overflow-hidden relative">
        
        <!-- Controls HUD -->
        <div class="flex flex-wrap justify-between items-center px-6 py-3 border-b border-white/5 bg-[#0a0a0e] shrink-0 z-30">
            <div class="flex items-center gap-8">
                <div class="flex items-center gap-3 bg-white/5 px-4 py-2 rounded-full border border-white/10">
                    <span class="text-[8px] font-black text-slate-500 uppercase tracking-widest">Vertical Scale</span>
                    <input id="vScaleSlider" type="range" min="1" max="10" value="3" step="0.1" class="w-24 sm:w-36 accent-blue-500">
                    <span id="vScaleDisplay" class="text-[9px] font-mono text-blue-400 w-8">3.0x</span>
                </div>
                <div class="flex items-center gap-3 bg-white/5 px-4 py-2 rounded-full border border-white/10">
                    <span class="text-[8px] font-black text-slate-500 uppercase tracking-widest">Width</span>
                    <input id="trackWidthSlider" type="range" min="40" max="600" value="120" class="w-24 sm:w-36 accent-blue-500">
                    <span id="trackWidthDisplay" class="text-[9px] font-mono text-blue-400 w-10 text-center">120px</span>
                </div>
            </div>

            <div class="flex items-center gap-5 text-[10px] font-black uppercase text-slate-600">
                <div class="flex items-center gap-2"><div class="w-2.5 h-2.5 bg-blue-500 rounded-full"></div> REC</div>
                <div class="flex items-center gap-2"><div class="w-2.5 h-2.5 border-2 border-blue-400/50 bg-blue-900/40 rounded-sm"></div> LOG</div>
            </div>
        </div>

        <!-- THE TIMELINE -->
        <div id="timelineContainer" class="flex-1 overflow-y-auto relative scrollbar-hide bg-[#050507]">
            <div id="timelineScrollSurface" class="relative">
                
                <!-- Atmosphere Indicator Strip (Left) -->
                <div id="atmosphereGrid" class="absolute left-0 w-3 h-full border-r border-white/5 rounded-r-full overflow-hidden"></div>

                <!-- Time Grid with 10-Min Intervals -->
                <div id="timeGrid" class="absolute left-3 right-0 pointer-events-none"></div>

                <!-- Spine Column (Now Clean) -->
                <div id="timelineSpine" class="absolute left-24 h-full" style="width: 120px;"></div>
                
                <div id="historyLayer"></div>
                <div id="activeLayer" class="absolute left-24 bg-blue-500/80 z-10 border-l-4 border-blue-400 shadow-xl" style="width: 120px; top: 0; height: 0; display: none;"></div>
                
                <!-- NOW Needle -->
                <div id="nowNeedle" class="absolute left-0 right-0 z-20 flex items-center pointer-events-none">
                    <div class="h-px flex-1 bg-red-600/30"></div>
                    <div class="h-0.5 w-full bg-red-600 shadow-[0_0_20px_red]" style="margin-left: 6rem;"></div>
                    <div class="absolute left-24 -translate-y-1/2 bg-red-600 text-[9px] font-black px-2 py-1 text-white rounded-full border-2 border-slate-950 uppercase shadow-lg">NOW</div>
                </div>
            </div>
        </div>

        <footer class="p-3 px-8 bg-[#111115] border-t border-white/10 flex justify-between items-center text-[10px] shrink-0 font-mono text-slate-500 uppercase tracking-widest rounded-t-3xl">
            <div id="footerStatus">SYSTEM READY • 10M SEGMENTS</div>
            <div id="footerClock" class="text-blue-500 font-bold px-3 py-1 bg-blue-500/5 rounded-full">00:00</div>
        </footer>
    </main>

    <script>
        // State
        let is24Hour = false, trackWidth = 120, vScale = 3.0;
        let isRecording = false, isFollowingLive = true, sessionSeconds = 0;
        let activeStartTime = null, history = [];

        // DOM Elements
        const mainHeader = document.getElementById('mainHeader'), headerDragger = document.getElementById('headerDragger');
        const mainClock = document.getElementById('mainClock'), footerClock = document.getElementById('footerClock');
        const sessionTimerDisplay = document.getElementById('sessionTimerDisplay'), mainActionBtn = document.getElementById('mainActionBtn');
        const followLiveBtn = document.getElementById('followLiveBtn'), vScaleSlider = document.getElementById('vScaleSlider');
        const trackWidthSlider = document.getElementById('trackWidthSlider'), timelineContainer = document.getElementById('timelineContainer');
        const timelineScrollSurface = document.getElementById('timelineScrollSurface'), timelineSpine = document.getElementById('timelineSpine');
        const activeLayer = document.getElementById('activeLayer'), nowNeedle = document.getElementById('nowNeedle');
        const timeGrid = document.getElementById('timeGrid'), historyLayer = document.getElementById('historyLayer'), atmosphereGrid = document.getElementById('atmosphereGrid');

        const formatClockTime = (date, sec = false) => {
            if (!date) return "--:--";
            return date.toLocaleTimeString([], { hour12: !is24Hour, hour: '2-digit', minute: '2-digit', second: sec ? '2-digit' : undefined });
        };

        const formatFullDuration = (s) => {
            const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        };

        const getPos = (d) => {
            const s = new Date(); s.setHours(0, 0, 0, 0);
            return ((d - s) / 60000) * vScale;
        };

        const renderTimeGrid = () => {
            if (!timeGrid) return;
            timeGrid.innerHTML = '';
            atmosphereGrid.innerHTML = '';
            
            const totalMinutes = 48 * 60; // 48 hours
            const totalHeight = totalMinutes * vScale;
            timelineScrollSurface.style.height = `${totalHeight}px`;

            // Atmosphere segments
            for (let i = 0; i < 48; i++) {
                const h = i % 24;
                const hourHeight = 60 * vScale;
                const atm = document.createElement('div');
                atm.className = 'absolute left-0 w-full opacity-30';
                atm.style.top = `${i * hourHeight}px`; atm.style.height = `${hourHeight}px`;
                
                let bgClass = '';
                if (h >= 0 && h < 6) bgClass = 'bg-midnight';
                else if (h >= 6 && h < 12) bgClass = 'bg-morning';
                else if (h >= 12 && h < 18) bgClass = 'bg-afternoon';
                else bgClass = 'bg-evening';
                
                atm.classList.add(bgClass);
                atmosphereGrid.appendChild(atm);
            }

            // Time Labels every 10 minutes (Rail design removed)
            for (let i = 0; i <= totalMinutes; i += 10) {
                const topPos = i * vScale;
                const h = Math.floor(i / 60) % 24;
                const m = i % 60;
                
                const timeDiv = document.createElement('div');
                timeDiv.className = `absolute left-0 right-0 border-t border-white/[0.03] flex items-start`;
                timeDiv.style.top = `${topPos}px`;
                timeDiv.style.height = `${10 * vScale}px`;
                
                let displayTime = "";
                if (is24Hour) {
                    displayTime = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
                } else {
                    const ampm = h >= 12 ? 'PM' : 'AM';
                    const displayH = h % 12 || 12;
                    displayTime = `${displayH}:${m.toString().padStart(2, '0')} ${ampm}`;
                }

                const isHour = m === 0;
                timeDiv.innerHTML = `<span class="text-[9px] font-mono block pl-4 pt-0.5 select-none ${isHour ? 'text-slate-400 font-bold' : 'text-slate-600 opacity-60'}">${displayTime}</span>`;
                timeGrid.appendChild(timeDiv);
            }
            renderHistory();
        };

        const renderHistory = () => {
            if (!historyLayer) return;
            historyLayer.innerHTML = '';
            history.forEach(seg => {
                const div = document.createElement('div');
                div.className = 'absolute left-24 work-history-block border-l-4 border-blue-400/60 shadow-lg';
                div.style.top = `${getPos(seg.start)}px`; 
                div.style.height = `${Math.max(3, getPos(seg.end) - getPos(seg.start))}px`;
                div.style.backgroundColor = 'rgba(59, 130, 246, 0.3)';
                div.style.width = `${trackWidth}px`;
                historyLayer.appendChild(div);
            });
        };

        const updateUI = () => {
            const now = new Date();
            if (mainClock) mainClock.textContent = formatClockTime(now, true);
            if (footerClock) footerClock.textContent = formatClockTime(now);
            
            const nowY = getPos(now);
            if (nowNeedle) nowNeedle.style.top = `${nowY}px`;

            if (isFollowingLive && timelineContainer) {
                timelineContainer.scrollTop = nowY - (timelineContainer.clientHeight / 2);
            }

            if (isRecording) {
                sessionSeconds++;
                sessionTimerDisplay.textContent = formatFullDuration(sessionSeconds);
                activeLayer.style.top = `${getPos(activeStartTime)}px`;
                activeLayer.style.height = `${nowY - getPos(activeStartTime)}px`;
                activeLayer.style.width = `${trackWidth}px`;
                activeLayer.style.display = 'block';
                document.getElementById('statusPulse').className = "w-2 h-2 rounded-full bg-green-500 animate-pulse shadow-[0_0_8px_#22c55e]";
                document.getElementById('statusLabel').textContent = "REC";
            } else {
                activeLayer.style.display = 'none';
                document.getElementById('statusPulse').className = "w-2 h-2 rounded-full bg-slate-600 shadow-none";
                document.getElementById('statusLabel').textContent = "IDLE";
            }
        };

        mainActionBtn.onclick = () => {
            isRecording = !isRecording;
            if (isRecording) {
                activeStartTime = new Date();
                document.getElementById('actionIcon').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect width="4" height="16" x="6" y="4" rx="1"/><rect width="4" height="16" x="14" y="4" rx="1"/></svg>`;
                mainActionBtn.className = "w-12 h-12 flex items-center justify-center bg-orange-600 hover:bg-orange-500 text-white rounded-full transition-all shadow-lg shadow-orange-900/20 active:scale-90";
            } else {
                if (activeStartTime) history.push({ start: activeStartTime, end: new Date() });
                document.getElementById('actionIcon').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="m7 4 12 8-12 8V4z"/></svg>`;
                mainActionBtn.className = "w-12 h-12 flex items-center justify-center bg-blue-600 hover:bg-blue-500 text-white rounded-full transition-all active:scale-90 shadow-lg shadow-blue-900/20";
                renderHistory();
            }
        };

        followLiveBtn.onclick = () => {
            isFollowingLive = !isFollowingLive;
            followLiveBtn.classList.toggle('btn-follow-active', isFollowingLive);
        };

        vScaleSlider.oninput = (e) => {
            vScale = parseFloat(e.target.value);
            document.getElementById('vScaleDisplay').textContent = vScale.toFixed(1) + 'x';
            renderTimeGrid();
        };

        trackWidthSlider.oninput = (e) => {
            trackWidth = parseInt(e.target.value);
            document.getElementById('trackWidthDisplay').textContent = trackWidth + 'px';
            timelineSpine.style.width = activeLayer.style.width = `${trackWidth}px`;
            renderHistory();
        };

        let isResizing = false;
        headerDragger.onpointerdown = (e) => { 
            isResizing = true; 
            headerDragger.classList.add('active');
            e.preventDefault(); 
        };
        
        document.addEventListener('pointermove', (e) => {
            if (!isResizing) return;
            const h = Math.min(Math.max(120, e.clientY), 450);
            mainHeader.style.height = `${h}px`;
        });
        
        document.addEventListener('pointerup', () => { 
            isResizing = false; 
            headerDragger.classList.remove('active'); 
        });

        document.getElementById('timeFormatToggle').onclick = () => {
            is24Hour = !is24Hour;
            document.getElementById('timeFormatToggle').textContent = is24Hour ? '24H' : '12H';
            renderTimeGrid();
        };

        // Init
        renderTimeGrid();
        followLiveBtn.classList.add('btn-follow-active');
        setInterval(updateUI, 1000);
        updateUI();
    </script>
</body>
</html>
